[[redirects]]
  from = "/admin/*"
  to = "/index.html"
  status = 200

# Grammar is served as static Astro files in dist/grammar/ (real files win
# before this rule). This only catches non-existent grammar sub-paths, which
# the SPA's /grammar/:level(/:topicSlug) routes render as the app shell — same
# behaviour as before, so grammar deep-links keep working.
[[redirects]]
  from = "/grammar/*"
  to = "/index.html"
  status = 200

# ---------------------------------------------------------------------------
# Real 404 — final catch-all. Any request that is neither a static file nor a
# known SPA route above returns the static 404 page WITH a 404 status (not the
# old 200 + SPA shell). Must stay LAST so the allow-list wins first.
# ---------------------------------------------------------------------------
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
