[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Ensure function endpoints are not caught by the SPA catch-all
[[redirects]]
  from = "/.netlify/functions/*"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
