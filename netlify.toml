[build]
  # Build order: SPA first (creates dist/), then Astro, then merge Astro output
  # into the SPA dist/ so grammar files aren't wiped by the Vite build.
  # _astro/ contains Astro's JS/CSS chunks; grammar/ contains the HTML pages.
  command = "npm run build && cd astro-site && npm install && npm run build && cd .. && cp -r astro-site/dist/grammar dist/grammar && mkdir -p dist/_astro && cp -r astro-site/dist/_astro/. dist/_astro/ && cp astro-site/dist/404.html dist/404.html && cp astro-site/dist/sitemap-0.xml dist/ && node scripts/ping-indexnow.mjs || true"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# 07:00 UTC daily (09:00 CET / 08:00 GMT)
[functions."daily-sentence"]
  schedule = "0 7 * * *"

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-XSS-Protection = "1; mode=block"

# Hashed bundles — filenames change on every build, safe to cache forever
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Force lowercase grammar level URLs
[[redirects]]
  from = "/grammar/A1.1"
  to = "/grammar/a1.1"
  status = 301

[[redirects]]
  from = "/grammar/A1.2"
  to = "/grammar/a1.2"
  status = 301

[[redirects]]
  from = "/grammar/A2.1"
  to = "/grammar/a2.1"
  status = 301

[[redirects]]
  from = "/grammar/A2.2"
  to = "/grammar/a2.2"
  status = 301

[[redirects]]
  from = "/grammar/B1.1"
  to = "/grammar/b1.1"
  status = 301

[[redirects]]
  from = "/grammar/B1.2"
  to = "/grammar/b1.2"
  status = 301

[[redirects]]
  from = "/grammar/B2.1"
  to = "/grammar/b2.1"
  status = 301

[[redirects]]
  from = "/grammar/B2.2"
  to = "/grammar/b2.2"
  status = 301

# Podcast RSS Feed
[[redirects]]
  from = "/podcast-feed.xml"
  to = "/.netlify/functions/podcast-feed"
  status = 200

# Speaking API proxy
[[redirects]]
  from = "/api/speaking/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Unsubscribe handler
[[redirects]]
  from = "/unsubscribe"
  to = "/.netlify/functions/unsubscribe"
  status = 200

# Return 404 for missing hashed assets (prevents serving index.html as JS/CSS)
[[redirects]]
  from = "/assets/*"
  to = "/404.html"
  status = 404

# Daily sentence trigger (test via /api/daily-sentence?test=true)
[[redirects]]
  from = "/api/daily-sentence"
  to = "/.netlify/functions/daily-sentence"
  status = 200

# Test endpoint — always sends only to zaid@deutsch-meister.de
[[redirects]]
  from = "/api/send-daily-test"
  to = "/.netlify/functions/send-daily-test"
  status = 200

# ---------------------------------------------------------------------------
# SPA route allow-list — serve the app shell (200) for every REAL client-side
# route in the React router (src/App.jsx). Netlify serves existing static files
# (grammar/, _astro/, /404.html, root index.html, public assets) directly and
# skips these non-forced rewrites, so only param/hash SPA routes reach here.
# Anything NOT matched here falls through to the 404 rule below — that is what
# turns unknown URLs into real HTTP 404s instead of a 200 + SPA shell.
#
# Keep this list in sync with the <Route> paths in src/App.jsx.
# ---------------------------------------------------------------------------

# --- Exact SPA routes ---
[[redirects]]
