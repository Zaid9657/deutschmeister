[build]
  # Build both the Astro grammar site and the Vite SPA, then merge outputs.
  # Astro grammar pages land in dist/ first; Vite SPA overwrites the root
  # without touching the /grammar/ subdirectory.
  command = "cd astro-site && npm install && npm run build && cp -r dist/grammar ../dist/grammar && cd .. && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-XSS-Protection = "1; mode=block"

# Force lowercase grammar level URLs
[[redirects]]
  from = "/grammar/A1.1"
  to = "/grammar/a1.1"
  status = 301

[[redirects]]
  from = "/grammar/A1.2"
  to = "/grammar/a1.2"
  status = 301

[[redirects]]
  from = "/grammar/A2.1"
  to = "/grammar/a2.1"
  status = 301

[[redirects]]
  from = "/grammar/A2.2"
  to = "/grammar/a2.2"
  status = 301

[[redirects]]
  from = "/grammar/B1.1"
  to = "/grammar/b1.1"
  status = 301

[[redirects]]
  from = "/grammar/B1.2"
  to = "/grammar/b1.2"
  status = 301

[[redirects]]
  from = "/grammar/B2.1"
  to = "/grammar/b2.1"
  status = 301

[[redirects]]
  from = "/grammar/B2.2"
  to = "/grammar/b2.2"
  status = 301

# Podcast RSS Feed
[[redirects]]
  from = "/podcast-feed.xml"
  to = "/.netlify/functions/podcast-feed"
  status = 200

# Speaking API proxy
[[redirects]]
  from = "/api/speaking/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Ensure function endpoints are not caught by the SPA catch-all
[[redirects]]
  from = "/.netlify/functions/*"
  status = 200

# Return 404 for missing hashed assets (prevents serving index.html as JS/CSS)
[[redirects]]
  from = "/assets/*"
  status = 404

# SPA catch-all — grammar routes are real static files in dist/grammar/ so
# Netlify serves them directly before this rule fires. Only truly missing
# paths (non-grammar, non-asset) fall through to the SPA.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
