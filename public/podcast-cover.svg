<?xml version="1.0" encoding="UTF-8"?>
<svg width="3000" height="3000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="3000" height="3000" fill="url(#bgGradient)"/>

  <!-- Episode count badge (top right) -->
  <rect x="2100" y="150" width="600" height="200" rx="100" fill="rgba(255,255,255,0.2)"/>
  <text x="2400" y="280" font-family="Arial, sans-serif" font-size="90" font-weight="bold" fill="white" text-anchor="middle">
    24 Episodes
  </text>

  <!-- Microphone icon circle -->
  <circle cx="1500" cy="800" r="300" fill="rgba(255,255,255,0.15)"/>

  <!-- Microphone icon -->
  <g transform="translate(1300, 550)">
    <!-- Mic body -->
    <rect x="140" y="20" width="120" height="280" rx="60" fill="white"/>
    <!-- Mic stand -->
    <rect x="185" y="300" width="30" height="200" fill="white"/>
    <!-- Mic base horizontal -->
    <rect x="100" y="480" width="200" height="30" rx="15" fill="white"/>
  </g>

  <!-- Title -->
  <text x="1500" y="1450" font-family="Arial, sans-serif" font-size="280" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-8" filter="url(#shadow)">
    DeutschMeister
  </text>

  <!-- Subtitle -->
  <text x="1500" y="1650" font-family="Arial, sans-serif" font-size="140" font-weight="600" fill="rgba(255,255,255,0.95)" text-anchor="middle" letter-spacing="2">
    Learn German Podcast
  </text>

  <!-- Level badge -->
  <g filter="url(#shadow)">
    <rect x="1050" y="2250" width="900" height="250" rx="125" fill="white"/>
    <text x="1500" y="2420" font-family="Arial, sans-serif" font-size="120" font-weight="900" fill="#EA580C" text-anchor="middle" letter-spacing="10">
      A1 → B2
    </text>
  </g>
</svg>
